<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input type="color" style="margin-right: 10px;"><button onclick="changeColor()">변경</button>
  <script>
    function changeColor() { document.querySelector('body').style.background = document.querySelector('input').value }
  </script>
</body>
</html>
